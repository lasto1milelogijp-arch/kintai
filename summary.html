<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>勤務時間確認</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 16px; color:#222; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    .total { font-size: 16px; margin: 8px 0 16px; }
    .total b { font-size: 24px; color:#06c755; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
    th { background:#f5f5f5; }
    .nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    button { font-size:14px; padding:6px 12px; border:1px solid #ccc; background:#fff; border-radius:6px; }
    #status { text-align:center; padding:40px; color:#666; }
  </style>
</head>
<body>
  <div id="status">読み込み中...</div>
  <div id="content" style="display:none;">
    <h1 id="name"></h1>
    <div class="nav">
      <button onclick="changeMonth(-1)">◀ 前月</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)">翌月 ▶</button>
    </div>
    <div class="total">合計勤務時間: <b id="total">-</b>（<span id="days">0</span>日）</div>
    <table>
      <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>勤務</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/versions/2.21.4/sdk.js"></script>
  <script>
    const LIFF_ID = "2010310932-MO7e9yXF";
    const GAS_URL = "https://script.google.com/macros/s/AKfycboxXaZ_4pZsL9EXWsFwNzHfjrcIe_l_9WK5JBmjoHzcO4ZW4YSorRpv5ad3L6IOLJkzZ/exec";

    let userId = null;
    let cur = new Date();

    window.onload = async function () {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        userId = profile.userId;
        load();
      } catch (e) {
        document.getElementById('status').innerText = 'エラー: ' + e.message;
      }
    };

    function ym(d){ return d.getFullYear() + '/' + ('0'+(d.getMonth()+1)).slice(-2); }

    function changeMonth(delta){ cur.setMonth(cur.getMonth() + delta); load(); }

    function load(){
      const st = document.getElementById('status');
      st.style.display = 'block'; st.innerText = '読み込み中...';
      document.getElementById('content').style.display = 'none';

      const cb = 'cb_' + Date.now();
      const s = document.createElement('script');
      window[cb] = function(res){ render(res); delete window[cb]; s.remove(); };
      s.src = GAS_URL + '?action=summary&userId=' + encodeURIComponent(userId)
            + '&month=' + encodeURIComponent(ym(cur)) + '&callback=' + cb;
      s.onerror = function(){ st.innerText = '読み込みに失敗しました'; };
      document.head.appendChild(s);
    }

    function render(res){
      const st = document.getElementById('status');
      if (!res || res.status !== 'ok') { st.innerText = 'データを取得できませんでした'; return; }
      st.style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('name').innerText = (res.name || '') + ' さん';
      document.getElementById('monthLabel').innerText = res.month;
      document.getElementById('total').innerText = res.totalText;
      document.getElementById('days').innerText = res.days;
      const tb = document.getElementById('tbody');
      tb.innerHTML = '';
      if (!res.rows || res.rows.length === 0){
        tb.innerHTML = '<tr><td colspan="4">この月の記録はありません</td></tr>'; return;
      }
      res.rows.forEach(function(r){
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>'+r.date.slice(5)+'</td><td>'+(r.in||'-')+'</td><td>'+(r.out||'-')+'</td><td>'+(r.work||'-')+'</td>';
        tb.appendChild(tr);
      });
    }
  </script>
</body>
</html>
