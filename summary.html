<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>勤務時間</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f7f8fa; color: #222; }
    .wrap { padding: 18px 16px 40px; max-width: 560px; margin: 0 auto; }
    h1 { font-size: 19px; margin: 2px 0 2px; }
    .sub { color: #777; font-size: 13px; margin: 0 0 16px; }
    .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .ttl { font-size: 13px; font-weight: bold; color: #555; margin: 0 0 10px; display:flex; align-items:center; gap:8px; }
    .bar { width: 4px; height: 16px; border-radius: 2px; display:inline-block; }
    .big { font-size: 26px; font-weight: bold; }
    .big small { font-size: 13px; color:#888; font-weight:normal; margin-left:6px;}
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 9px 6px; text-align: left; border-bottom: 1px solid #eee; }
    th { color: #999; font-weight: normal; font-size: 12px; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tr.today td { background: #eef7f0; font-weight: bold; }
    tr.empty td { color: #bbb; }
    .wk { display:inline-block; width:1.4em; text-align:center; color:#888; }
    .nav { display:flex; align-items:center; justify-content:space-between; margin: 0 0 12px; }
    .nav button { border: 1px solid #ccc; background:#fff; border-radius: 8px; padding: 6px 12px; font-size: 14px; cursor:pointer; }
    .nav .m { font-weight:bold; font-size:15px; }
    #msg { text-align:center; padding:40px 10px; color:#666; }
    .spin { display:inline-block; width:22px; height:22px; border:3px solid #ddd; border-top-color:#06c755; border-radius:50%; animation:sp .8s linear infinite; vertical-align:-4px; margin-right:8px; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="msg"><span class="spin"></span>読み込み中…</div>
    <div id="main" class="hidden">
      <h1 id="name">勤務時間</h1>
      <p class="sub" id="sub"></p>

      <div class="card">
        <p class="ttl"><span class="bar" style="background:#1f9d55"></span>今週（直近7日間）</p>
        <div class="big" id="weekTotal">―</div>
        <table id="weekTbl">
          <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th class="num">勤務</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card">
        <div class="nav">
          <button id="prev">‹ 前月</button>
          <span class="m" id="month"></span>
          <button id="next">翌月 ›</button>
        </div>
        <p class="ttl"><span class="bar" style="background:#2d7dd2"></span>当月の合計</p>
        <div class="big" id="monthTotal">―<small id="monthDays"></small></div>
        <table id="monthTbl">
          <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th class="num">勤務</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/versions/2.21.4/sdk.js"></script>
  <script>
    const LIFF_ID = "2010310932-MO7e9yXF";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxXaZ_4pZsL9EXWsFwNzHfjrcIe_I_9WK5JBmjoHZcO4ZW4YSorRpv5ad3L6IOLJkzZ/exec";
    const $ = function (id) { return document.getElementById(id); };
    let userId = '', curMonth = '', profName = '';

    function mdLabel(d) { const p = d.split('/'); return p[1] + '/' + p[2]; }

    function renderWeek(week, weekTotalText) {
      $('weekTotal').textContent = weekTotalText || '0時間0分0秒';
      const tb = $('weekTbl').querySelector('tbody'); tb.innerHTML = '';
      (week || []).forEach(function (r) {
        const tr = document.createElement('tr');
        if (r.today) tr.className = 'today'; else if (!r.work) tr.className = 'empty';
        tr.innerHTML = '<td>' + mdLabel(r.date) + ' <span class="wk">' + r.wday + '</span></td>'
          + '<td>' + (r.in || '―') + '</td><td>' + (r.out || '―') + '</td>'
          + '<td class="num">' + (r.work || '―') + '</td>';
        tb.appendChild(tr);
      });
    }
    function renderMonth(data) {
      $('month').textContent = (data.month || '').replace('/', '年') + '月';
      $('monthTotal').firstChild.nodeValue = data.totalText || '0時間0分0秒';
      $('monthDays').textContent = '（' + (data.days || 0) + '日）';
      const tb = $('monthTbl').querySelector('tbody'); tb.innerHTML = '';
      if (!data.rows || !data.rows.length) {
        tb.innerHTML = '<tr class="empty"><td colspan="4">記録なし</td></tr>'; return;
      }
      data.rows.forEach(function (r) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>' + mdLabel(r.date) + '</td><td>' + (r.in || '―') + '</td>'
          + '<td>' + (r.out || '―') + '</td><td class="num">' + (r.work || '―') + '</td>';
        tb.appendChild(tr);
      });
    }

    async function load(month) {
      $('msg').classList.remove('hidden'); $('main').classList.add('hidden');
      const q = 'action=summary&userId=' + encodeURIComponent(userId) + (month ? '&month=' + encodeURIComponent(month) : '');
      const d = await callGas(q);
      if (!d || d.status !== 'ok') { $('msg').textContent = '読み込みに失敗しました'; return; }
      curMonth = d.month;
      var nm = d.name || profName; $('name').textContent = nm ? (nm + ' さんの勤務時間') : '勤務時間';
      $('sub').textContent = '今週の合計と、月ごとの記録を表示します';
      renderWeek(d.week, d.weekTotalText);
      renderMonth(d);
      $('msg').classList.add('hidden'); $('main').classList.remove('hidden');
    }
    function shiftMonth(delta) {
      const p = curMonth.split('/'); let y = +p[0], m = +p[1] + delta;
      if (m < 1) { m = 12; y--; } if (m > 12) { m = 1; y++; }
      load(y + '/' + ('0' + m).slice(-2));
    }

    window.onload = async function () {
      try {
        if (typeof liff === 'undefined') throw new Error('SDK読み込み失敗');
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const prof = await liff.getProfile(); userId = prof.userId; profName = prof.displayName || '';
        $('prev').onclick = function () { shiftMonth(-1); };
        $('next').onclick = function () { shiftMonth(1); };
        await load('');
      } catch (e) { $('msg').textContent = '⚠️ エラー: ' + (e.message || e); }
    };

    function jsonpGet(qs) {
      return new Promise(function (resolve, reject) {
        const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const s = document.createElement('script'); let done = false;
        const timer = setTimeout(function () { if (!done) { reject(new Error('timeout')); s.remove(); delete window[cb]; } }, 30000);
        window[cb] = function (d) { done = true; clearTimeout(timer); resolve(d); delete window[cb]; s.remove(); };
        s.onerror = function () { if (!done) { clearTimeout(timer); reject(new Error('jsonp fail')); } s.remove(); };
        s.src = GAS_URL + '?' + qs + '&callback=' + cb;
        document.head.appendChild(s);
      });
    }
    async function callGas(qs) { return await jsonpGet(qs); }
  </script>
</body>
</html>
