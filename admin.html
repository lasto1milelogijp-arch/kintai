<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>з®ЎзҗҶиҖ…з”»йқў</title>
<style>
  body{font-family:sans-serif;margin:0;padding:16px;color:#222;background:#fafafa}
  h2{font-size:16px;margin:18px 0 8px;border-left:5px solid #06c755;padding-left:8px}
  .card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:12px;margin-bottom:10px}
  .meta{font-size:14px;margin-bottom:8px}.meta b{font-size:15px}
  .btns{display:flex;gap:8px}
  .btns button{flex:1;padding:10px;font-size:14px;font-weight:bold;border:none;border-radius:8px;color:#fff}
  .ok{background:#06c755}.no{background:#e0564b}
  table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:8px;overflow:hidden}
  th,td{padding:8px 6px;border-bottom:1px solid #eee;text-align:center}th{background:#f0f0f0}
  #status{text-align:center;color:#666;padding:30px}
  .denied{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:20px;text-align:center}
  .idbox{font-family:monospace;font-size:12px;background:#f3f3f3;padding:10px;border-radius:6px;word-break:break-all;margin-top:10px}
  .empty{color:#888;font-size:14px;padding:10px;text-align:center}
</style>
</head>
<body>
  <div id="status">иӘӯгҒҝиҫјгҒҝдёӯ...</div>
  <div id="app" style="display:none">
    <h2>д»Ҡж—ҘгҒ®еҮәеӢӨзҠ¶жіҒпјҲ<span id="today"></span>пјү</h2>
    <table><thead><tr><th>ж°ҸеҗҚ</th><th>еҮәеӢӨ</th><th>йҖҖеӢӨ</th><th>еӢӨеӢҷ</th></tr></thead><tbody id="attBody"></tbody></table>
    <h2>жүҝиӘҚеҫ…гҒЎгҒ®гӮ·гғ•гғҲ</h2>
    <div id="pending"></div>
  </div>
  <div id="denied" class="denied" style="display:none">
    <div>гҒ“гҒ®гӮўгӮ«гӮҰгғігғҲгҒ«гҒҜз®ЎзҗҶиҖ…жЁ©йҷҗгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ</div>
    <div style="margin-top:8px;font-size:13px;color:#666">дёӢгҒ®IDгӮ’гҖҢз®ЎзҗҶиҖ…гҖҚгӮ·гғјгғҲгҒ®AеҲ—гҒ«иҝҪеҠ гҒҷгӮӢгҒЁз®ЎзҗҶиҖ…гҒ«гҒӘгӮҢгҒҫгҒҷгҖӮ</div>
    <div class="idbox" id="myid"></div>
  </div>

<script src="https://static.line-scdn.net/liff/edge/versions/2.21.4/sdk.js"></script>
<script>
  const LIFF_ID = "2010310932-MO7e9yXF";
  const GAS_URL = "вҳ… index.html гҒЁеҗҢгҒҳ GAS_URL гӮ’иІјгӮӢ вҳ…";
  let userId = null;
  const enc = encodeURIComponent;

  function jsonp(params){
    return new Promise(function(resolve, reject){
      const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);
      const s=document.createElement('script'); let done=false;
      window[cb]=function(d){ done=true; resolve(d); delete window[cb]; s.remove(); };
      s.onerror=function(){ if(!done) reject(new Error('йҖҡдҝЎеӨұж•—')); s.remove(); };
      s.src=GAS_URL+'?'+params+'&callback='+cb;
      document.head.appendChild(s);
    });
  }

  window.onload = async function(){
    try{
      await liff.init({ liffId: LIFF_ID });
      if(!liff.isLoggedIn()){ liff.login(); return; }
      const p = await liff.getProfile();
      userId = p.userId;
      loadAll();
    }catch(e){ document.getElementById('status').innerText='гӮЁгғ©гғј: '+e.message; }
  };

  async function loadAll(){
    const st=document.getElementById('status');
    st.style.display='block'; st.innerText='иӘӯгҒҝиҫјгҒҝдёӯ...';
    try{
      const data = await jsonp('action=admin_data&userId='+enc(userId));
      if(data.status==='denied'){
        st.style.display='none';
        document.getElementById('denied').style.display='block';
        document.getElementById('myid').innerText = data.yourId || userId;
        return;
      }
      render(data);
    }catch(e){ st.innerText='иӘӯгҒҝиҫјгҒҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ'; }
  }

  function render(data){
    document.getElementById('status').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('today').innerText = data.today||'';
    const ab=document.getElementById('attBody'); ab.innerHTML='';
    if(!data.attendance||data.attendance.length===0){
      ab.innerHTML='<tr><td colspan="4" class="empty">жң¬ж—ҘгҒ®жү“еҲ»гҒҜгҒҫгҒ гҒӮгӮҠгҒҫгҒӣгӮ“</td></tr>';
    }else{
      data.attendance.forEach(function(r){
        ab.innerHTML+='<tr><td>'+(r.name||'')+'</td><td>'+(r.in||'-')+'</td><td>'+(r.out||'-')+'</td><td>'+(r.work||'-')+'</td></tr>';
      });
    }
    const pe=document.getElementById('pending'); pe.innerHTML='';
    if(!data.pending||data.pending.length===0){
      pe.innerHTML='<div class="empty">жүҝиӘҚеҫ…гҒЎгҒ®гӮ·гғ•гғҲгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
    }else{
      data.pending.forEach(function(s){
        const div=document.createElement('div'); div.className='card';
        div.innerHTML='<div class="meta"><b>'+(s.name||'')+'</b>гҖҖ'+s.date+'гҖҖ'+(s.start||'')+'гҖң'+(s.end||'')+(s.note?'гҖҖ('+s.note+')':'')+'</div>';
        const btns=document.createElement('div'); btns.className='btns';
        const ok=document.createElement('button'); ok.className='ok'; ok.innerText='зўәе®ҡ';
        const no=document.createElement('button'); no.className='no'; no.innerText='еҚҙдёӢ';
        ok.onclick=function(){ decide(s.row,'зўәе®ҡ',div,ok,no); };
        no.onclick=function(){ decide(s.row,'еҚҙдёӢ',div,ok,no); };
        btns.appendChild(ok); btns.appendChild(no); div.appendChild(btns); pe.appendChild(div);
      });
    }
  }

  async function decide(row, decision, div, ok, no){
    ok.disabled=true; no.disabled=true; ok.innerText='...';
    try{
      const res = await jsonp('action=shift_decision&userId='+enc(userId)+'&row='+row+'&decision='+enc(decision));
      if(res.status==='ok'){ div.style.opacity=0.5; div.innerHTML='<div class="meta">'+decision+'гҒ—гҒҫгҒ—гҒҹ</div>'; }
      else { ok.disabled=false; no.disabled=false; ok.innerText='зўәе®ҡ'; alert('еӨұж•—гҒ—гҒҫгҒ—гҒҹ'); }
    }catch(e){ ok.disabled=false; no.disabled=false; ok.innerText='зўәе®ҡ'; alert('йҖҡдҝЎгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ'); }
  }
</script>
</body>
</html>
