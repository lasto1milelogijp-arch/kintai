<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>検査</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #fff; color: #222; }
    .wrap { padding: 22px 20px 40px; max-width: 520px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 4px 0 6px; }
    .lead { color: #666; font-size: 14px; margin: 0 0 18px; line-height: 1.6; }
    .btn { display: block; width: 100%; box-sizing: border-box; border: none; border-radius: 14px; margin-top: 16px;
           padding: 22px; font-size: 20px; font-weight: bold; color: #fff; cursor: pointer; }
    .k { background: #2f8f8f; }
    .g { background: #b06a3b; }
    .btn:disabled { opacity: .5; }
    .count { margin-top: 22px; background: #f3f6f9; border: 1px solid #e2e8ef; border-radius: 12px; padding: 14px 16px; font-size: 16px; }
    .count b { font-size: 22px; }
    .row { display:flex; gap:12px; }
    .row > div { flex:1; text-align:center; }
    #msg { text-align: center; margin-top: 14px; font-size: 15px; font-weight: bold; min-height: 22px; }
    .spin { display:inline-block; width:18px; height:18px; border:3px solid #ddd; border-top-color:#2f8f8f; border-radius:50%; animation:sp .8s linear infinite; vertical-align:-3px; margin-right:6px; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .hidden { display:none; }
  </style>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.21.4/sdk.js"></script>
  <script>
    const LIFF_ID = "2010310932-MO7e9yXF";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxXaZ_4pZsL9EXWsFwNzHfjrcIe_I_9WK5JBmjoHZcO4ZW4YSorRpv5ad3L6IOLJkzZ/exec";
    let profile = null, lat = '', lng = '';
    const $ = function (id) { return document.getElementById(id); };

    window.onload = async function () {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        profile = await liff.getProfile();
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function (p) { lat = p.coords.latitude; lng = p.coords.longitude; }, function () {}, { timeout: 6000 });
        }
        $('kimitsu').onclick = function () { record('気密検査'); };
        $('gaibu').onclick = function () { record('外部検査'); };
        $('form').classList.remove('hidden');
        refresh();
      } catch (e) {
        $('msg').textContent = '⚠️ エラー: ' + (e.message || e);
      }
    };

    async function record(kind) {
      $('kimitsu').disabled = true; $('gaibu').disabled = true;
      $('msg').innerHTML = '<span class="spin"></span>記録中…';
      const params = new URLSearchParams();
      params.append('contents', JSON.stringify({ action: 'inspect', userId: profile.userId, displayName: profile.displayName, kind: kind, lat: lat, lng: lng }));
      try { await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: params }); } catch (e) {}
      $('msg').textContent = '✅ ' + kind + ' を記録しました';
      setTimeout(function () { refresh(); $('kimitsu').disabled = false; $('gaibu').disabled = false; }, 800);
    }

    async function refresh() {
      try {
        const d = await jsonpGet('action=inspect_today&userId=' + encodeURIComponent(profile.userId));
        if (d && d.status === 'ok') {
          $('ck').textContent = d.kimitsu; $('cg').textContent = d.gaibu;
        }
      } catch (e) {}
    }

    function jsonpGet(qs) {
      return new Promise(function (resolve, reject) {
        const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const s = document.createElement('script'); let done = false;
        const timer = setTimeout(function () { if (!done) { reject(new Error('timeout')); s.remove(); delete window[cb]; } }, 30000);
        window[cb] = function (d) { done = true; clearTimeout(timer); resolve(d); delete window[cb]; s.remove(); };
        s.onerror = function () { if (!done) { clearTimeout(timer); reject(new Error('jsonp fail')); } s.remove(); };
        s.src = GAS_URL + '?' + qs + '&callback=' + cb;
        document.head.appendChild(s);
      });
    }
  </script>
</head>
<body>
  <div class="wrap">
    <h1>検査の記録</h1>
    <p class="lead">検査をしたら、該当するボタンを押してください。<br>1回押すと1件として記録されます。</p>
    <div id="form" class="hidden">
      <button class="btn k" id="kimitsu">気密検査を記録</button>
      <button class="btn g" id="gaibu">外部検査を記録</button>
      <div class="count">
        <div class="row">
          <div>気密検査<br><b id="ck">0</b> 件</div>
          <div>外部検査<br><b id="cg">0</b> 件</div>
        </div>
        <div style="text-align:center;color:#888;font-size:12px;margin-top:8px">今日の件数</div>
      </div>
      <div id="msg"></div>
    </div>
  </div>
</body>
</html>
